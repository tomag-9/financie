<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Financie offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1120;
        --panel: rgba(15, 23, 42, 0.9);
        --panel-border: rgba(148, 163, 184, 0.2);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.2), transparent 35%),
          radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.15), transparent 30%),
          var(--bg);
        color: var(--text);
        padding: 24px;
      }

      main {
        width: min(560px, 100%);
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        background: var(--panel);
        padding: 28px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
      }

      h1 {
        margin: 12px 0 8px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .card {
        margin-top: 20px;
        border-radius: 18px;
        border: 1px solid var(--panel-border);
        padding: 18px;
        background: rgba(15, 23, 42, 0.45);
      }

      a {
        display: inline-flex;
        margin-top: 18px;
        border-radius: 999px;
        padding: 12px 18px;
        color: #0f172a;
        background: #e2e8f0;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Offline fallback</div>
      <h1>You're offline.</h1>
      <p>The app could not load the requested page, so this fallback was shown instead.</p>
      <div class="card">
        <p>When the connection returns, you can continue using snapshots, income, and investments as usual.</p>
      </div>
      <a href="/dashboard">Go to dashboard</a>
    </main>
  </body>
</html>
