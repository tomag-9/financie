services:
  financie:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financie-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/financie.db
      NEXTAUTH_URL: https://finance.tomag.xyz
      AUTH_TRUST_HOST: "true"
      AUTH_SECRET: ${AUTH_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL}
      ENABLE_CRON: ${ENABLE_CRON:-true}
      DEFAULT_SAVINGS_TARGET: ${DEFAULT_SAVINGS_TARGET:-20}
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY:-}
      SEED_DATA_PASSWORD: ${SEED_DATA_PASSWORD:-}
      SEED_DATA_ENCODE_PASSWORD: ${SEED_DATA_ENCODE_PASSWORD:-}
      SEED_DATA_DECODE_PASSWORD: ${SEED_DATA_DECODE_PASSWORD:-}
    volumes:
      - financie_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.middlewares.financie-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.financie-https-redirect.redirectscheme.permanent=true"
      - "traefik.http.routers.financie-http.rule=Host(`finance.tomag.xyz`)"
      - "traefik.http.routers.financie-http.entrypoints=web"
      - "traefik.http.routers.financie-http.middlewares=financie-https-redirect"
      - "traefik.http.routers.financie-http.service=noop@internal"
      - "traefik.http.routers.financie.rule=Host(`finance.tomag.xyz`)"
      - "traefik.http.routers.financie.entrypoints=websecure"
      - "traefik.http.routers.financie.tls=true"
      - "traefik.http.routers.financie.tls.certresolver=letsencrypt"
      - "traefik.http.services.financie.loadbalancer.server.port=3000"
    networks:
      - default
      - dokploy-network

volumes:
  financie_data:

networks:
  dokploy-network:
    external: true
